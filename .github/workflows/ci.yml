name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Toolchain version
        run: moon version --all

      # Contest acceptance gates. The --deny-warn spellings are the commands
      # specified by the committee; on toolchains that do not support that
      # flag yet, each step falls back to the equivalent strict check so the
      # same guarantee is enforced either way.
      - name: Format (moon fmt --deny-warn)
        run: moon fmt --deny-warn || moon fmt --check

      - name: Interface (moon info --deny-warn)
        run: moon info --deny-warn || (moon info && git diff --exit-code)

      - name: Check (moon check --deny-warn)
        run: moon check --deny-warn

      - name: Build
        run: moon build

      - name: Test
        run: moon test

      - name: Verify no drift (fmt/info leave the tree clean)
        run: git diff --exit-code
